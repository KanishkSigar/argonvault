# Local-only dev stack. Brings up a MinIO server that speaks the S3 API,
# so the backend's boto3 code is identical to what would talk to AWS S3.
#
#   docker compose up -d
#   open http://localhost:9001  (console — log in with the credentials below)
#
# The bucket is auto-created on first boot by the `createbucket` sidecar.

services:
  minio:
    image: minio/minio:latest
    container_name: vault-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: vaultadmin
      MINIO_ROOT_PASSWORD: vaultadminsecret
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Runs once: create the bucket + permissive CORS for the local frontend.
  createbucket:
    image: minio/mc:latest
    container_name: vault-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vaultadmin vaultadminsecret &&
      (mc mb local/vault || true) &&
      mc anonymous set none local/vault
      "

volumes:
  minio-data:
